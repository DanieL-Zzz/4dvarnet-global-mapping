# @package _global_

hydra:
  run:
    dir: outputs/${now:%Y-%m-%d}/${xpname}-${now:%H-%M-%S}
  callbacks:
    LogJobReturnCallback:
      _target_: hydra.experimental.callbacks.LogJobReturnCallback

xpname: noname
ckpt: null

trainer:
  _target_: pytorch_lightning.Trainer
  inference_mode: false
  deterministic: true
  gradient_clip_val: 0.5
  accelerator: gpu
  devices: 1
  logger:
    _target_: pytorch_lightning.loggers.tensorboard.TensorBoardLogger
    save_dir: ${hydra:runtime.output_dir}
    name: ${hydra:runtime.choices.xp}
    version: ''
  max_epochs: 1000
  limit_train_batches: 1000
  callbacks:
    - _target_: pytorch_lightning.callbacks.LearningRateMonitor
    - _target_: pytorch_lightning.callbacks.ModelCheckpoint
      monitor: val_mse
      save_last: true
      save_top_k: 3
      filename: '{val_mse:.5f}-{epoch:03d}'

datamodule:
  _target_: contrib.ose.OSEDataModule
  input_da:
    _target_: contrib.ose.load_ose_data
    # bool_file_path: /Odyssey/public/altimetry_traces/2010_2019/da_ose_2010_2019_daily_bool_1deg.nc
    # nadir_dir_path: /Odyssey/public/altimetry_traces/2010_2019/gridded
    bool_file_path: /SCRATCH/d22zhu/ose/da_ose_2010_2019_daily_bool_1deg.nc
    nadir_dir_path: /SCRATCH/d22zhu/ose/gridded_0.25deg
    nadir_fn_pattern: ose_*_daily_sla_0.25deg.nc
  domains:
    train:
      time: {_target_: builtins.slice, _args_: ['2010-01-01', '2017-11-30']}
    val:
      time: {_target_: builtins.slice, _args_: ['2018-01-01', '2018-11-30']}
  xrds_kw:
    train:
      patch_dims: {time: 15, latitude: 48, longitude: 48}
      strides: {time: 1, latitude: 40, longitude: 40}
      # domain_limits: ${domain.train}
    val:
      patch_dims: {time: 15, latitude: 48, longitude: 48}
      strides: {time: 1, latitude: 40, longitude: 40}
      # domain_limits: ${domain.train}
  dl_kw: {batch_size: 64, num_workers: 12}
  # norm_stats:  # values from Glorys
  #   train:
  #   - -0.001930378327255099
  #   - 0.08604745118775728
  #   val:
  #   - 0.01560162689028551
  #   - 0.08583080433051968

model:
  _target_: contrib.ose.LitOSE
  opt_fn:
    _target_: ocean4dvarnet.utils.cosanneal_lr_adam
    _partial_: true
    lr: 1e-4
    T_max: ${trainer.max_epochs}
  rec_weight:
    _target_: contrib.ose.get_triang_time_wei
    patch_dims: ${datamodule.xrds_kw.train.patch_dims}
    crop:
      time: 0
      latitude: 4
      longitude: 4
  solver:
    _target_: ocean4dvarnet.models.GradSolver
    n_step: 15
    lr_grad: 1e3
    prior_cost:
      _target_: ocean4dvarnet.models.BilinAEPriorCost
      dim_in: ${datamodule.xrds_kw.train.patch_dims.time}
      dim_hidden: 64
      bilin_quad: false
      downsamp: 2
    obs_cost:
      _target_: ocean4dvarnet.models.BaseObsCost
    grad_mod:
      _target_: ocean4dvarnet.models.ConvLstmGradModel
      dim_in: ${datamodule.xrds_kw.train.patch_dims.time}
      dim_hidden: 96
  # norm_stats: ${datamodule.norm_stats}

entrypoints:
  - _target_: pytorch_lightning.seed_everything
    seed: 333
  - _target_: contrib.ose.train
    trainer: ${trainer}
    lit_mod: ${model}
    dm: ${datamodule}
    ckpt: ${ckpt}

defaults:
  - _self_