# @package _global_

domain: ???
ckpt: null
xpname: ???

model:
  _target_: contrib.glorys12.unet.LitUnetFromLit4dVarNetIgnoreNaN
  w_mse: 50.0
  w_grad_mse: 1000.0
  w_prior: 1.0
  persist_rw: false
  opt_fn:
    _target_: contrib.glorys12.unet.cosanneal_lr_adam_base
    _partial_: true
    lr: 1e-4
    T_max: ${trainer.max_epochs}
  rec_weight:
    _target_: ocean4dvarnet.utils.get_triang_time_wei
    patch_dims: ${datamodule.xrds_kw.train.patch_dims}
    crop: {time: 0, lat: 4, lon: 4}
  val_rec_weight:
    _target_: ocean4dvarnet.utils.get_triang_time_wei
    patch_dims: ${datamodule.xrds_kw.val.patch_dims}
    crop: {time: 0, lat: 4, lon: 4}
  norm_stats: ${datamodule.norm_stats}
  w_mse_lr: 0.0
  w_grad_mse_lr: 0
  osse_with_interp_error: false
  solver:
    _target_: contrib.glorys12.unet.UnetSolverBilin
    dim_in: 15
    dropout: 0.1
    channel_dims:
    - 256
    - 256
    - 256
    - 256
    - 256
    - 256
    - 256
    - 256
    - 256
    - 512
    bias: false
    interp_mode: bilinear
    activation_layer:
      _target_: torch.nn.ReLU

defaults:
  - base
  - _self_
