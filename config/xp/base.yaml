# @package _global_

hydra:
  run:
    dir: outputs/${now:%Y-%m-%d}/${xpname}-${now:%H-%M-%S}
  callbacks:
    LogJobReturnCallback:
      _target_: hydra.experimental.callbacks.LogJobReturnCallback

domain: ???
ckpt: null
xpname: ???

trainer:
  _target_: pytorch_lightning.Trainer
  inference_mode: false
  deterministic: true
  gradient_clip_val: 0.5
  accelerator: gpu
  devices: 1
  logger:
    _target_: pytorch_lightning.loggers.tensorboard.TensorBoardLogger
    save_dir: ${hydra:runtime.output_dir}
    name: ${hydra:runtime.choices.xp}
    version: ''
  max_epochs: 1000
  limit_train_batches: 250
  callbacks:
  - _target_: pytorch_lightning.callbacks.LearningRateMonitor
  - _target_: pytorch_lightning.callbacks.ModelCheckpoint
    monitor: val_mse
    save_last: true
    save_top_k: 3
    filename: '{val_mse:.5f}-{epoch:03d}'
  check_val_every_n_epoch: 3

datamodule:
  _target_: contrib.glorys12.unet.DistinctNormDataModulewInputTracks
  input_da:
    _target_: contrib.glorys12.load_glorys12_data_on_fly_inp
    tgt_path: /SCRATCH/d22zhu/glorys12_2010_2019_daily_sla_4th_target_gridded_alongtrack.nc
    tgt_var: sla
    inp_path: /SCRATCH/d22zhu/glorys12_2010_2019_daily_sla_4th_input_gridded_alongtrack.nc
    inp_var: sla
  domains:
    train:
      time:
        _target_: builtins.slice
        _args_: ['2010-01-01', '2017-11-30']
    val:
      time:
        _target_: builtins.slice
        _args_: ['2017-12-01', '2018-11-30']
    test: null
  xrds_kw:
    train:
      patch_dims: {time: 15, lat: 256, lon: 256}
      strides: {time: 1, lat: 16, lon: 16}
      domain_limits: ${domain.train}
      noise: 0.03
      noise_type: gaussian+uniform
      periodic_dim: lon
      padded_dim: lat
    val:
      patch_dims: {time: 15, lat: 512, lon: 512}
      strides: {time: 1, lat: 136, lon: 488}
      domain_limits: ${domain.train}
      noise: 0.03
      noise_type: uniform-constant
  dl_kw:
    batch_size: 16
    num_workers: 4
  norm_stats:
    train:
    - -0.001930378327255099
    - 0.08604745118775728
    val:
    - 0.01560162689028551
    - 0.08583080433051968

entrypoints:
  - _target_: pytorch_lightning.seed_everything
    seed: 333
  - _target_: contrib.glorys12.train
    trainer: ${trainer}
    lit_mod: ${model}
    dm: ${datamodule}
    ckpt: ${ckpt}

defaults:
  - /domain: glorys
  - _self_
